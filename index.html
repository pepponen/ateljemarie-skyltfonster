<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ateljé Marie – Skyltfönster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
      --bg-text: #f7f5ef;
          --ink: #121212;
              --ink-dim: rgba(18,18,18,0.62);
                  --yellow: #fcf887;
                    }

                      *{ margin:0; padding:0; box-sizing:border-box; }

                        html, body{
                            width:100%; height:100%;
                                background:#000;
                                    overflow:hidden;
                                        cursor:none;
                                            user-select:none;
                                                font-family:'DM Sans', sans-serif;
                                                  }

                                                    #stage{ position:relative; width:100vw; height:100vh; }

                                                      .slide{
                                                          position:absolute; inset:0;
                                                              opacity:0;
                                                                  transition: opacity 1.4s ease;
                                                                    }
                                                                      .slide.active{ opacity:1; z-index:2; }

                                                                        .slide.photo .frame{ position:absolute; inset:0; overflow:hidden; }
                                                                          .slide.photo img{
                                                                              width:100%; height:100%;
                                                                                  object-fit:cover;
                                                                                      display:block;
                                                                                          will-change: transform;
                                                                                            }
                                                                                              @keyframes kbIn  { from{ transform:scale(1);    } to{ transform:scale(1.08); } }
                                                                                                @keyframes kbOut { from{ transform:scale(1.08); } to{ transform:scale(1);    } }

                                                                                                  .slide.text{
                                                                                                      background: var(--bg-text);
                                                                                                          display:flex; align-items:center; justify-content:center;
                                                                                                            }
                                                                                                              .slide.text .content{
                                                                                                                  display:flex; flex-direction:column; align-items:center;
                                                                                                                      text-align:center;
                                                                                                                          opacity:0;
                                                                                                                              transform: translateY(18px);
                                                                                                                                  transition: opacity .9s ease, transform .9s ease;
                                                                                                                                      padding: 0 8%;
                                                                                                                                          max-width: 90%;
                                                                                                                                            }
                                                                                                                                              .slide.text.active .content{ opacity:1; transform: translateY(0); }
                                                                                                                                              
                                                                                                                                                .eyebrow{
                                                                                                                                                    display:inline-block;
                                                                                                                                                        background: var(--yellow);
                                                                                                                                                            color: var(--ink);
                                                                                                                                                                font-weight:700;
                                                                                                                                                                    font-size: clamp(0.8rem, 2.2vw, 1.05rem);
                                                                                                                                                                        letter-spacing:.18em;
                                                                                                                                                                            text-transform:uppercase;
                                                                                                                                                                                padding: 7px 18px;
                                                                                                                                                                                    margin-bottom: 26px;
                                                                                                                                                                                      }
                                                                                                                                                                                      
                                                                                                                                                                                        .title{
                                                                                                                                                                                            font-family:'DM Sans', sans-serif;
                                                                                                                                                                                                font-weight:800;
                                                                                                                                                                                                    font-size: clamp(2.3rem, 7vw, 4.6rem);
                                                                                                                                                                                                        line-height:1.08;
                                                                                                                                                                                                            letter-spacing:-0.01em;
                                                                                                                                                                                                                color: var(--ink);
                                                                                                                                                                                                                  }
                                                                                                                                                                                                                  
                                                                                                                                                                                                                    .line{
                                                                                                                                                                                                                        width:0;
                                                                                                                                                                                                                            height:3px;
                                                                                                                                                                                                                                background: var(--ink);
                                                                                                                                                                                                                                    margin: 28px 0;
                                                                                                                                                                                                                                        transition: width 1s ease .3s;
                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                            .slide.text.active .line{ width:84px; }
                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                              .detail{
                                                                                                                                                                                                                                                  font-family:'DM Sans', sans-serif;
                                                                                                                                                                                                                                                      font-weight:500;
                                                                                                                                                                                                                                                          font-size: clamp(1rem, 2.6vw, 1.3rem);
                                                                                                                                                                                                                                                              color: var(--ink-dim);
                                                                                                                                                                                                                                                                  max-width: 85%;
                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                      #dots{
                                                                                                                                                                                                                                                                          position:fixed;
                                                                                                                                                                                                                                                                              bottom: 30px; left:0; right:0;
                                                                                                                                                                                                                                                                                  display:flex; justify-content:center; gap:10px;
                                                                                                                                                                                                                                                                                      z-index:5;
                                                                                                                                                                                                                                                                                          padding:8px 14px;
                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                              .dot{
                                                                                                                                                                                                                                                                                                  width:7px; height:7px; border-radius:50%;
                                                                                                                                                                                                                                                                                                      background: rgba(255,255,255,0.4);
                                                                                                                                                                                                                                                                                                          border: 1px solid rgba(0,0,0,0.15);
                                                                                                                                                                                                                                                                                                              transition: background .4s, transform .4s;
                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                  .dot.active{ background: var(--yellow); transform: scale(1.5); border-color: rgba(0,0,0,0.3); }
                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                    @media (prefers-reduced-motion: reduce){
                                                                                                                                                                                                                                                                                                                        .slide, .slide.text .content, .line, .dot{ transition-duration: .2s !important; }
                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                          </style>
                                                                                                                                                                                                                                                                                                                          </head>
                                                                                                                                                                                                                                                                                                                          <body>
                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                          <div id="stage"></div>
                                                                                                                                                                                                                                                                                                                          <div id="dots"></div>
                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                          <script>
                                                                                                                                                                                                                                                                                                                          const OWNER = 'pepponen';
                                                                                                                                                                                                                                                                                                                          const REPO  = 'ateljemarie-skyltfonster';
                                                                                                                                                                                                                                                                                                                          const FOLDER = 'bilder';
                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                          const TEXT_SLIDES = [
                                                                                                                                                                                                                                                                                                                            { type:'text',
                                                                                                                                                                                                                                                                                                                                eyebrow:'ATELJÉ MARIE',
                                                                                                                                                                                                                                                                                                                                    title:'Sedan 1934',
                                                                                                                                                                                                                                                                                                                                        detail:'Göteborgs äldsta fotostudio · Vasaplatsen 5' },
                                                                                                                                                                                                                                                                                                                                          { type:'text',
                                                                                                                                                                                                                                                                                                                                              eyebrow:'ÖPPETTIDER',
                                                                                                                                                                                                                                                                                                                                                  title:'Mån–Fre 9–17',
                                                                                                                                                                                                                                                                                                                                                      detail:'Lunch 12–13 · Lördag enbart efter tidsbokning' },
                                                                                                                                                                                                                                                                                                                                                        { type:'text',
                                                                                                                                                                                                                                                                                                                                                            eyebrow:'BOKA TID',
                                                                                                                                                                                                                                                                                                                                                                title:'Porträtt, pass & företag',
                                                                                                                                                                                                                                                                                                                                                                    detail:'ateljemarie.se · 031-13 83 38' },
                                                                                                                                                                                                                                                                                                                                                                      { type:'text',
                                                                                                                                                                                                                                                                                                                                                                          eyebrow:'NYHET',
                                                                                                                                                                                                                                                                                                                                                                              title:'Nu kan du boka via hemsidan!',
                                                                                                                                                                                                                                                                                                                                                                                  detail:'ateljemarie.se' },
                                                                                                                                                                                                                                                                                                                                                                                    { type:'text',
                                                                                                                                                                                                                                                                                                                                                                                        eyebrow:'FÖRETAGSFOTO',
                                                                                                                                                                                                                                                                                                                                                                                            title:'Professionella reportagebilder eller lediga företagsporträtt?',
                                                                                                                                                                                                                                                                                                                                                                                                detail:'Vi hjälper er hitta rätt stil · ateljemarie.se' },
                                                                                                                                                                                                                                                                                                                                                                    ];
                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                    const INSERT_EVERY = 3;
                                                                                                                                                                                                                                                                                                                                                                    const DURATIONS = { photo: 6000, text: 8000 };
                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                                                                                                                                                                                                                                                                                                                                                                    const stage = document.getElementById('stage');
                                                                                                                                                                                                                                                                                                                                                                    const dotsWrap = document.getElementById('dots');
                                                                                                                                                                                                                                                                                                                                                                    let SLIDES = [];
                                                                                                                                                                                                                                                                                                                                                                    let slideEls, dotEls, current = -1;
                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                    function buildSlides(photos) {
                                                                                                                                                                                                                                                                                                                                                                      const slides = [];
                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                        if (photos.length === 0) {
                                                                                                                                                                                                                                                                                                                                                                            slides.push({ type:'text',
                                                                                                                                                                                                                                                                                                                                                                                  eyebrow:'ATELJÉ MARIE',
                                                                                                                                                                                                                                                                                                                                                                                        title:'Lägg in foton',
                                                                                                                                                                                                                                                                                                                                                                                              detail:'Lägg bildfiler i mappen "bilder" på GitHub' });
                                                                                                                                                                                                                                                                                                                                                                                                  return slides;
                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                      let t = 0;
                                                                                                                                                                                                                                                                                                                                                                                                        photos.forEach((p, i) => {
                                                                                                                                                                                                                                                                                                                                                                                                            slides.push(p);
                                                                                                                                                                                                                                                                                                                                                                                                                if ((i + 1) % INSERT_EVERY === 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                      slides.push(TEXT_SLIDES[t % TEXT_SLIDES.length]);
                                                                                                                                                                                                                                                                                                                                                                                                                            t++;
                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                  });
                                                                                                                                                                                                                                                                                                                                                                                                                                    if (slides[slides.length - 1].type !== 'text') {
                                                                                                                                                                                                                                                                                                                                                                                                                                        slides.push(TEXT_SLIDES[t % TEXT_SLIDES.length]);
                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                            return slides;
                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                            function renderSlides() {
                                                                                                                                                                                                                                                                                                                                                                                                                                              stage.innerHTML = '';
                                                                                                                                                                                                                                                                                                                                                                                                                                                dotsWrap.innerHTML = '';
                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                  SLIDES.forEach((s) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                      const el = document.createElement('div');
                                                                                                                                                                                                                                                                                                                                                                                                                                                          el.className = 'slide ' + s.type;
                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                              if (s.type === 'photo') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    el.innerHTML = `<div class="frame"><img src="${s.src}" alt=""></div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              el.innerHTML = `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="content">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ${s.eyebrow ? `<span class="eyebrow">${s.eyebrow}</span>` : ''}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <h1 class="title">${s.title || ''}</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="line"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ${s.detail ? `<p class="detail">${s.detail}</p>` : ''}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              stage.appendChild(el);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const dot = document.createElement('span');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      dot.className = 'dot';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          dotsWrap.appendChild(dot);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              slideEls = stage.children;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                dotEls = dotsWrap.children;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function goTo(i) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if (current >= 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      slideEls[current].classList.remove('active');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          dotEls[current].classList.remove('active');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              current = i;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const el = slideEls[current];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const cfg = SLIDES[current];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    el.classList.add('active');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      dotEls[current].classList.add('active');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const wait = cfg.duration || DURATIONS[cfg.type] || 6000;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if (cfg.type === 'photo' && !reduceMotion) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const img = el.querySelector('img');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const animDur = wait + 1500;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      img.style.animation = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          void img.offsetWidth;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              img.style.animation = `${current % 2 === 0 ? 'kbIn' : 'kbOut'} ${animDur}ms ease forwards`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  setTimeout(() => goTo((current + 1) % SLIDES.length), wait);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function start(photos) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    SLIDES = buildSlides(photos);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      renderSlides();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const photoSrcs = SLIDES.filter(s => s.type === 'photo').map(s => s.src);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          Promise.all(photoSrcs.map(src => new Promise(resolve => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const img = new Image();
