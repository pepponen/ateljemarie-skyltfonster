                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  img.onload = img.onerror = resolve;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      img.src = src;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }))).then(() => goTo(0));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const IMAGE_EXT = ['.jpg', '.jpeg', '.png', '.webp', '.gif'];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}`)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .then(r => r.ok ? r.json() : [])
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .then(list => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const photos = list
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      .filter(item => item.type === 'file' && IMAGE_EXT.some(ext => item.name.toLowerCase().endsWith(ext)))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .sort((a, b) => a.name.localeCompare(b.name, 'sv'))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .map(item => ({ type: 'photo', src: item.download_url }));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      start(photos);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .catch(() => start([]));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </html>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </html>
